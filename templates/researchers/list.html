{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="h4 mb-0">Researchers</h2>
  <a href="{{ url_for('create_researcher') }}" class="btn btn-primary btn-sm">Add Researcher</a>
</div>

<table class="table table-striped table-hover align-middle">
  <thead class="table-light">
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Role</th>
      <th>Department</th>
      <th style="width: 80px;"></th>
    </tr>
  </thead>
  <tbody>
    {% for r in researchers %}
      <tr>
        <td>{{ r.name }}</td>
        <td>{{ r.email }}</td>
        <td>{{ r.role }}</td>
        <td>{{ r.department }}</td>
        <td class="text-end">
          <a href="{{ url_for('edit_researcher', researcher_id=r.id) }}" class="btn btn-sm btn-outline-secondary">Edit</a>
        </td>
      </tr>
    {% else %}
      <tr>
        <td colspan="5" class="text-center text-muted py-3">No researchers found.</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
