{% extends "base.html" %}
{% block content %}
<h2 class="h4 mb-3">
  {% if sample %}Edit Sample{% else %}Add Sample{% endif %}
</h2>

<form method="post" class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Sample Code *</label>
        <input type="text" name="sample_code" class="form-control"
               value="{{ sample.sample_code if sample else '' }}" required>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Sample Type *</label>
        <select name="sample_type" class="form-select" required>
          {% set current_type = sample.sample_type if sample else '' %}
          {% for t in ['Soil', 'Water', 'Biological', 'Other'] %}
            <option value="{{ t }}" {% if current_type == t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Collected Date (YYYY-MM-DD) *</label>
        <input type="date" name="collected_date" class="form-control"
               value="{{ sample.collected_date if sample else '' }}" required>
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Volume (mL)</label>
        <input type="number" step="0.1" name="volume_ml" class="form-control"
               value="{{ sample.volume_ml if sample and sample.volume_ml is not none else '' }}">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Status *</label>
        <select name="status" class="form-select" required>
          {% set current_status = sample.status if sample else 'Stored' %}
          {% for st in ['Stored', 'In use', 'Consumed', 'Disposed'] %}
            <option value="{{ st }}" {% if current_status == st %}selected{% endif %}>{{ st }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Collector *</label>
        <select name="researcher_id" class="form-select" required>
          <option value="">-- select researcher --</option>
          {% for r in researchers %}
            <option value="{{ r.id }}"
                    {% if sample and sample.researcher_id == r.id %}selected{% endif %}>
              {{ r.name }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Storage Location *</label>
      <select name="storage_location_id" class="form-select" required>
        <option value="">-- select location --</option>
        {% for loc in locations %}
          <option value="{{ loc.id }}"
                  {% if sample and sample.storage_location_id == loc.id %}selected{% endif %}>
            {{ loc.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Description / Notes</label>
      <textarea name="description" class="form-control" rows="3">{{ sample.description if sample else '' }}</textarea>
    </div>
  </div>
  <div class="card-footer bg-white d-flex justify-content-between">
    <a href="{{ url_for('list_samples') }}" class="btn btn-outline-secondary btn-sm">Cancel</a>
    <button type="submit" class="btn btn-primary btn-sm">Save</button>
  </div>
</form>
{% endblock %}
